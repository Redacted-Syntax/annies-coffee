<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latte Page</title>
    <link rel="stylesheet" href="css/latte-styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <header class="navbar">
        <div class="logo">
          <img
            src="https://assets.codepen.io/t-15440/cannons-coffee-logo.png"
            alt="Cannons Coffee, Beans of Joy! Est. 2014"
            class="logo"
          />
          <h1>Cannons Coffee</h1>
        </div>
        <div class="navbar_container">
          <nav class="nav-child">
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="latte.html">Coffee</a></li>
              <li>
                <a href="https://www.isnotokay.com" target="_blank">About</a>
              </li>
              <li>
                <a href="mailto:anaisgreyson95@gmail.com" target="_blank"
                  >Contact</a
                >
              </li>
              <li><a href="login.html">Login</a></li>
              <li><a href="inquiry.html">Inquiry</a></li>
            </ul>
          </nav>
        </div>
      </header>
      <main>
        <h2>Login</h2>
        <form id="login-form">
          <fieldset>
            <legend>Login Information</legend>
            <label for="name">name:</label>
            <input type="text" id="name" name="name" required />
            <br />
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
            <br />
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
          </fieldset>
          <button type="submit">Login</button>
        </form>
        <div id="welcome-message"></div>
      </main>
      <footer>
        <div class="footer_container">
          <img
            src=" https://assets.codepen.io/296057/logo-footer.png"
            alt="Cannons Coffee, Beans of Joy! Est. 2014"
            class="logo"
          />
          <p class="copyright">© 2026 Cannons Coffee. All Rights Reserved.</p>
        </div>
        <!-- .footer_container div ending -->
      </footer>
    </div>
    <!-- .wrapper div ending -->
    <script src="js/custom-login.js"></script>
  </body>
</html>
